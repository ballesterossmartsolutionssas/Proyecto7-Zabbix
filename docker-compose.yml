name: proyecto7-zabbix

services:
  postgres:
    image: postgres:15-alpine
    container_name: zbx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - zabbix-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - monitoring

  zabbix-server:
    build:
      context: ./docker/zabbix-server
      dockerfile: Dockerfile
    image: proyecto7-zabbix-server:6.0-custom
    container_name: zabbix-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${ZABBIX_DB_PASSWORD}
      ZBX_STARTPOLLERS: 8
      ZBX_STARTTRAPPERS: 5
      ZBX_CACHESIZE: 128M
      ZBX_INCLUDE: /etc/zabbix/zabbix_server.conf.d/*.conf
      TZ: ${TZ}
    volumes:
      - ./docker/zabbix-server/zabbix_server.conf.d/proyecto7.conf:/etc/zabbix/zabbix_server.conf.d/proyecto7.conf:ro
    ports:
      - "10051:10051"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10051 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - monitoring

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-6.0-latest
    container_name: zabbix-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      zabbix-server:
        condition: service_started
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${ZABBIX_DB_PASSWORD}
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: ${TZ}
      TZ: ${TZ}
    ports:
      - "${ZABBIX_WEB_PORT:-8088}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
    networks:
      - monitoring

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - monitoring

  web-service:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    image: proyecto7-web-service:latest
    container_name: web-service
    restart: unless-stopped
    depends_on:
      db-service:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: db-service
      DB_PORT: 3306
      DB_NAME: ${MARIADB_DATABASE}
      DB_USER: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitoring

  db-service:
    image: mariadb:10.11
    container_name: db-service
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      TZ: ${TZ}
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uroot -p${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - monitoring

  dns-service:
    image: coredns/coredns:1.11.3
    container_name: dns-service
    restart: unless-stopped
    command: -conf /Corefile
    volumes:
      - ./services/dns/Corefile:/Corefile:ro
    healthcheck:
      test: ["CMD", "/coredns", "-version"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - monitoring

  ftp-service:
    image: fauria/vsftpd
    container_name: ftp-service
    restart: unless-stopped
    environment:
      FTP_USER: ${FTP_USER}
      FTP_PASS: ${FTP_PASS}
      PASV_ADDRESS: ftp-service
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/21' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
    networks:
      - monitoring

  web-agent:
    image: zabbix/zabbix-agent2:alpine-6.0-latest
    container_name: web-agent
    restart: unless-stopped
    depends_on:
      - zabbix-server
      - web-service
    environment:
      ZBX_HOSTNAME: web-host
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: 10051
      TZ: ${TZ}
    volumes:
      - ./zabbix-config/agent/proyecto7-agent.conf:/etc/zabbix/zabbix_agentd.d/proyecto7-agent.conf:ro
    networks:
      - monitoring

  db-agent:
    image: zabbix/zabbix-agent2:alpine-6.0-latest
    container_name: db-agent
    restart: unless-stopped
    depends_on:
      - zabbix-server
      - db-service
    environment:
      ZBX_HOSTNAME: db-host
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: 10051
      TZ: ${TZ}
    volumes:
      - ./zabbix-config/agent/proyecto7-agent.conf:/etc/zabbix/zabbix_agentd.d/proyecto7-agent.conf:ro
    networks:
      - monitoring

  dns-agent:
    image: zabbix/zabbix-agent2:alpine-6.0-latest
    container_name: dns-agent
    restart: unless-stopped
    depends_on:
      - zabbix-server
      - dns-service
    environment:
      ZBX_HOSTNAME: dns-host
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: 10051
      TZ: ${TZ}
    volumes:
      - ./zabbix-config/agent/proyecto7-agent.conf:/etc/zabbix/zabbix_agentd.d/proyecto7-agent.conf:ro
    networks:
      - monitoring

  ftp-agent:
    image: zabbix/zabbix-agent2:alpine-6.0-latest
    container_name: ftp-agent
    restart: unless-stopped
    depends_on:
      - zabbix-server
      - ftp-service
    environment:
      ZBX_HOSTNAME: ftp-host
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: 10051
      TZ: ${TZ}
    volumes:
      - ./zabbix-config/agent/proyecto7-agent.conf:/etc/zabbix/zabbix_agentd.d/proyecto7-agent.conf:ro
    networks:
      - monitoring

volumes:
  zabbix-db-data:

networks:
  monitoring:
    name: proyecto7-monitoring
    driver: bridge
