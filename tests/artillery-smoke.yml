config:
  target: "https://web-zabbix.negociocontigo.com"
  phases:
    - name: "Smoke test"
      duration: 8
      arrivalRate: 1
  defaults:
    headers:
      Content-Type: "application/json"
      User-Agent: "Proyecto7-Artillery-Smoke"

scenarios:
  - name: "Validacion rapida"
    flow:
      - get:
          url: "/"
      - get:
          url: "/health"
      - get:
          url: "/api/summary"
      - get:
          url: "/api/db/status"
      - get:
          url: "/api/slo"
      - get:
          url: "/api/charts"
      - get:
          url: "/api/compliance"
      - get:
          url: "/api/incidents"
      - get:
          url: "/metrics"
      - post:
          url: "/api/telemetry"
          json:
            source: "artillery-smoke"
            cpu: 50
            memory: 45
            disk: 35
            message: "smoke test"
      - get:
          url: "/api/load/mixed?ms=20&kb=16"
      - post:
          url: "/api/incidents"
          json:
            service: "web-service"
            severity: "low"
            status: "open"
            title: "Smoke incident"
            description: "Validacion rapida de escritura en MariaDB"
